<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>宮務工作台｜公告管理測試</title><style>:root{--gold:#cba15b;--red:#76241d;--paper:#f7efe3;--ink:#382719;--line:#dac4a1;--muted:#75624c;--good:#206043}*{box-sizing:border-box}body{margin:0;background:#15110e;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif;color:var(--ink)}.site{max-width:820px;min-height:100vh;margin:auto;background:var(--paper)}.top{padding:28px 16px 20px;background:linear-gradient(135deg,#64221b,#160e0c);color:#ffe7b7}.top small{letter-spacing:.2em;color:#e8c27d}.top h1{margin:8px 0;font-family:serif;font-size:33px;letter-spacing:.12em}.top p{margin:0;color:#dec7a1;font-size:13px;line-height:1.7}.main{padding:18px 16px 48px;background:linear-gradient(#291b13 0,#f3e6d5 7%,#f8f0e3 100%)}.notice{padding:14px;border-left:4px solid #8d3028;border-radius:8px;background:#f0e1ca;font-size:13px;line-height:1.75}.tabs{display:flex;gap:8px;overflow:auto;padding:16px 0 6px}.tabs button{white-space:nowrap;border:1px solid #d3b17b;border-radius:99px;padding:9px 12px;background:#fffaf1;color:#5a4122;font:inherit;font-size:13px}.tabs button.active{background:var(--red);color:#ffe8b9;border-color:var(--red)}.title{display:flex;align-items:center;gap:9px;margin:23px 0 12px;font-family:serif;font-size:23px}.title:before{content:"";width:18px;height:18px;transform:rotate(45deg);background:#8d3028;border:1px solid #d8af69}.title:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--gold),transparent)}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.stat{padding:14px 10px;border:1px solid var(--line);border-radius:10px;background:#fffaf1}.stat b{display:block;font-family:serif;font-size:27px;color:#792f27}.stat span{display:block;margin-top:4px;color:var(--muted);font-size:11px}.record{margin-top:10px;padding:15px;border:1px solid var(--line);border-radius:10px;background:#fffaf1}.record h
