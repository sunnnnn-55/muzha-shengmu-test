<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#12100e">
<title>點燈祈福宮務後台｜木柵聖母宮</title>
<style>
:root{--gold:#cba15b;--red:#842d26;--paper:#f7efe3;--ink:#3b2a1b;--muted:#746553;--line:#d9c29e;--ok:#276249;--warn:#9c6416;--danger:#922c26}*{box-sizing:border-box}body{margin:0;background:#080706;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif}.site{max-width:820px;margin:auto;min-height:100vh;background:var(--paper)}.top{height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;color:#f5e2b4;background:#12100e;border-bottom:1px solid rgba(207,163,91,.42)}.brand{font-family:serif;font-weight:800;font-size:18px;letter-spacing:.13em}.seal{display:inline-grid;place-items:center;width:30px;height:30px;margin-right:8px;border-radius:50%;border:1px solid #f5deb0;background:#751f19}.back{color:#d8b979;text-decoration:none;font-size:12px}.hero{padding:33px 16px 27px;background:linear-gradient(135deg,#632119,#160f0d);color:#f8e5bd}.hero small{letter-spacing:.24em;color:#efca84;font-size:10px}.hero h1{margin:10px 0 6px;font-family:serif;font-size:33px;letter-spacing:.1em}.hero p{margin:0;color:#dec8a2;font-size:13px;line-height:1.7}.main{padding:24px 16px 54px;background:linear-gradient(#2a1c13 0,#f3e7d5 7%,#f7efe3 100%)}.notice{padding:15px;border-left:4px solid var(--red);border-radius:8px;background:#f0e1ca;color:#695744;font-size:13px;line-height:1.75}.notice b{color:#3d2a1a}.dash{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:19px 0}.stat{padding:14px 10px;border:1px solid var(--line);border-radius:9px;background:#fffaf1;text-align:center}.num{font-family:serif;font-size:26px;color:#783027}.stat small{display:block;margin-top:5px;font-size:11px;line-height:1.4;color:#75624c}.section{margin-top:30px}.heading{display:flex;align-items:center;gap:10px;margin:0 0 12px;color:var(--ink);font-family:serif;font-size:23px;letter-spacing:.08em}.heading:before{content:"";width:18px;height:18px;transform:rotate(45deg);background:#8d3028;border:1px solid #d8af69}.heading:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--gold),transparent)}.toolbar{display:flex;gap:9px;align-items:center;justify-content:space-between;margin-bottom:10px}.toolbar select{flex:1;border:1px solid #d8c6a8;border-radius:9px;background:#fffaf1;padding:10px;font:inherit;color:var(--ink)}.linebtn{border:1px solid #ae8a4a;border-radius:9px;background:#fff7e8;color:#6b4318;padding:10px 12px;font:inherit;font-size:12px;font-weight:800}.record{padding:15px;margin-top:10px;border:1px solid var(--line);border-radius:10px;background:#fffaf1}.record-top{display:flex;justify-content:space-between;gap:13px}.record h3{margin:0;color:#3b291a;font-size:17px}.record p{margin:7px 0 0;color:#6c5d4b;font-size:13px;line-height:1.72}.meta{color:#917653;font-size:11px}.badges{display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end}.badge{display:inline-block;padding:4px 8px;border-radius:99px;font-size:11px;font-weight:800;white-space:nowrap}.pending{background:#fff0cf;color:#855a12}.confirmed{background:#e6f3ea;color:#226141}.paid{background:#dff1e8;color:#206043}.unpaid{background:#f8e7dc;color:#8a3428}.actions{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}.btn{border:0;border-radius:8px;padding:9px 11px;font:inherit;font-size:12px;font-weight:800;cursor:pointer}.confirm{background:#72231d;color:#ffebbd;border:1px solid #cfaa65}.cash{background:#e8f4eb;color:#216043;border:1px solid #9cc9ac}.docs{background:#f2e8d7;color:#79521c;border:1px solid #d7b77d}.empty{padding:18px;border:1px dashed #c7aa7b;border-radius:9px;color:#765e42;background:#fffaf1;font-size:13px}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,18px);z-index:8;opacity:0;pointer-events:none;max-width:88%;padding:11px 14px;border-radius:99px;background:#24140f;color:#ffe8b9;box-shadow:0 8px 20px rgba(0,0,0,.35);font-size:13px;transition:.25s}.toast.show{opacity:1;transform:translate(-50%,0)}.footer{margin:36px -16px -54px;padding:36px 16px 47px;text-align:center;background:#0d0c0b;border-top:4px solid #7e2d26;color:#d7c4a9}.footer b{font-family:serif;font-size:18px;letter-spacing:.14em}.footer p{margin:9px 0 0;color:#9e907d;font-size:12px}@media(min-width:620px){.main{padding-left:28px;padding-right:28px}.hero{padding-left:28px;padding-right:28px}.footer{margin-left:-28px;margin-right:-28px;padding-left:28px;padding-right:28px}.dash{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div class="site">
<header class="top"><div class="brand"><span class="seal">媽</span>木柵聖母宮</div><a class="back" href="light-integrated-test.html">← 回點燈前台</a></header>
<section class="hero"><small>LIGHT OFFERING ADMIN</small><h1>點燈祈福｜宮務後台</h1><p>測試登記資料管理：確認資料、登錄現金已繳。僅限目前裝置測試，不可輸入真實個資。</p></section>
<main class="main">
<div class="notice"><b>目前為前台／後台串聯測試。</b><br>此後台讀取同一台裝置中的點燈測試資料；確認或登錄已繳後，香客查詢頁可再測試是否同步更新。</div>
<div class="dash" id="dash"></div>
<section class="section"><h2 class="heading">點燈登記名單</h2><div class="toolbar"><select id="filter"><option value="all">全部狀態</option><option value="待確認">待確認</option><option value="已確認">已確認</option><option value="需補件">需補件</option></select><button class="linebtn" id="reset">重置點燈假資料</button></div><div id="records"></div></section>
</main>
<footer class="footer"><b>木柵聖母宮</b><p>點燈祈福宮務後台｜測試資料管理，不連接正式金流或資料庫。</p></footer>
</div>
<div class="toast" id="toast"></div>
<script>
const KEY='msm_v1_demo_state';
const seedLamp={id:'LMP-2026-0001',name:'測試點燈信眾',phone:'0912001234',type:'平安燈',target:'測試對象',birth:'',note:'測試資料',status:'待確認',pay:'未繳',created:'2026-06-19'};
function clone(v){return JSON.parse(JSON.stringify(v))}
function load(){try{const x=JSON.parse(localStorage.getItem(KEY));if(x&&Array.isArray(x.registrations)){x.lamps=Array.isArray(x.lamps)?x.lamps:[];x.lamps.forEach(r=>{if(!r.status)r.status='待確認';if(!r.pay)r.pay='未繳'});if(!x.lamps.length)x.lamps=[clone(seedLamp)];if(!x.lampSeq)x.lampSeq=1;return x}}catch(e){}return {seq:1,registrations:[],lampSeq:1,lamps:[clone(seedLamp)]}}
let state=load();
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function toast(t){const x=document.getElementById('toast');x.textContent=t;x.classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>x.classList.remove('show'),1800)}
function statusClass(s){return s==='已確認'?'confirmed':'pending'}
function render(){save();const lamps=state.lamps||[];const confirmed=lamps.filter(x=>x.status==='已確認').length;const paid=lamps.filter(x=>x.pay==='已繳').length;const pending=lamps.filter(x=>x.status==='待確認').length;document.getElementById('dash').innerHTML=`<div class="stat"><div class="num">${lamps.length}</div><small>測試登記筆數</small></div><div class="stat"><div class="num">${pending}</div><small>待確認</small></div><div class="stat"><div class="num">${confirmed}</div><small>已確認</small></div><div class="stat"><div class="num">${paid}</div><small>現金已繳</small></div>`;const f=document.getElementById('filter').value;const arr=lamps.filter(x=>f==='all'||x.status===f);document.getElementById('records').innerHTML=arr.length?arr.map(r=>`<article class="record"><div class="record-top"><div><h3>${esc(r.name)} <span class="meta">${r.id}</span></h3><p>${mask(r.phone)}｜${esc(r.type)}｜祈福對象：${esc(r.target)}<br>農曆生日：${esc(r.birth||'未填寫')}｜備註：${esc(r.note||'無')}</p></div><div class="badges"><span class="badge ${statusClass(r.status)}">${r.status}</span><span class="badge ${r.pay==='已繳'?'paid':'unpaid'}">${r.pay}</span></div></div><div class="actions"><button class="btn confirm" onclick="setStatus('${r.id}','已確認')">確認</button><button class="btn cash" onclick="setPay('${r.id}','已繳')">登錄現金已繳</button><button class="btn docs" onclick="setStatus('${r.id}','需補件')">需補件</button></div></article>`).join(''):'<div class="empty">沒有符合的點燈測試資料。</div>'}
function setStatus(id,status){const r=state.lamps.find(x=>x.id===id);if(!r)return;r.status=status;save();render();toast('狀態已改為 '+status)}
function setPay(id,pay){const r=state.lamps.find(x=>x.id===id);if(!r)return;r.pay=pay;save();render();toast('繳費狀態已登錄')}
function mask(p){p=String(p||'');return p.length>4?p.slice(0,-4)+'****':p}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
document.getElementById('filter').addEventListener('change',render);document.getElementById('reset').addEventListener('click',()=>{state.lamps=[clone(seedLamp)];state.lampSeq=1;save();render();toast('點燈假資料已重置')});render();
</script>
</body>
</html>
