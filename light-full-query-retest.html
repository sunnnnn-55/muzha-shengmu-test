<!doctype html><html lang="zh-Hant"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>點燈查詢重測</title><style>body{margin:0;background:#f7efe3;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif;color:#382719}.w{max-width:720px;margin:auto;padding:24px 16px;min-height:100vh}.h{background:#5f211b;color:#f9e5bc;margin:-24px -16px 20px;padding:28px 16px}.h h1{font-family:serif;margin:5px 0;font-size:30px}.box,.card{padding:16px;border:1px solid #dac4a1;border-radius:10px;background:#fffaf1}.f{display:grid;gap:6px;margin:12px 0}.f input{padding:13px;border:1px solid #d8cbb8;border-radius:10px;font-size:16px}.b{width:100%;padding:14px;border:0;border-radius:10px;background:#76241d;color:#ffe8b9;font-size:16px;font-weight:800}.card{margin-top:16px;line-height:1.9;background:#f0f9f2;border-color:#bdd6c3}.pill{display:inline-block;margin:7px 6px 0 0;padding:4px 9px;border-radius:99px;background:#dff1e8;color:#206043;font-size:12px;font-weight:800}</style><main class="w"><header class="h"><small>LIGHT OFFERING · FULL RETEST</small><h1>點燈登記查詢</h1><div>本頁重測六項完整顯示。</div></header><section class="box"><div class="f"><b>點燈碼</b><input id="a" placeholder="LMP-2026-0002"></div><div class="f"><b>手機末四碼</b><input id="b" maxlength="4" inputmode="numeric" placeholder="4567"></div><button class="b" id="go">查詢測試資料</button></section><div id="o"></div></main><script>document.getElementById('go').onclick=function(){var s={},r,id=document.getElementById('a').value.trim().toUpperCase(),n=document.getElementById('b').value.trim();try{s=JSON.parse(localStorage.getItem('msm_v1_demo_state')||'{}')}catch(e){}r=(s.lamps||[]).find(function(x){return x.id===id&&String(x.phone).slice(-4)===n});if(!r){o.innerHTML='<div class="card">查無測試資料。</div>';return}o.innerHTML='<article class="card"><b>'+r.name+'｜'+r.id+'</b><br><span class="pill">'+(r.status||'待確認')+'</span><span class="pill">'+(r.pay||'未繳')+'</span><br>燈別：'+(r.type||'未填寫')+'<br>祈福對象：'+(r.target||'未填寫')+'<br>農曆生日：'+(r.birth||'未填寫')+'<br>備註：'+(r.note||'無')+'<br>繳費狀態：'+(r.pay||'未繳')+'</article>'}}</script></html>
