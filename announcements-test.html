<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#12100e">
<title>最新公告｜木柵聖母宮</title>
<style>
:root{--gold:#cba15b;--pale:#f4deae;--red:#8d3028;--paper:#f6eddf;--ink:#3b2a1b;--muted:#766958}
*{box-sizing:border-box}
body{margin:0;background:#070706;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif}
.site{max-width:820px;margin:auto;min-height:100vh;background:#f8f0e3;overflow:hidden}
.top{height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#12100e;color:#f5e2b4;border-bottom:1px solid rgba(207,163,91,.42)}
.brand{font-family:serif;font-size:18px;font-weight:800;letter-spacing:.13em;text-decoration:none;color:#f5e2b4}
.brand i{display:inline-grid;place-items:center;width:30px;height:30px;margin-right:8px;border-radius:50%;border:1px solid var(--pale);background:radial-gradient(circle at 34% 26%,#c95341,#5b1a16 73%);font-style:normal}
.back{font-size:12px;color:#d8b979;text-decoration:none}
.hero{position:relative;min-height:300px;overflow:hidden;background:#4a3828}
.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:78% center;filter:brightness(.58) contrast(1.07) saturate(.88)}
.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(8,7,6,.64),rgba(8,7,6,.22) 48%,rgba(8,7,6,.04) 78%),linear-gradient(180deg,rgba(7,6,5,.05) 35%,rgba(7,6,5,.58) 100%)}
.plaque{position:absolute;z-index:3;right:15px;top:18px;padding:6px;background:linear-gradient(145deg,#d8b16a,#5a3518,#e7c57e);box-shadow:0 8px 18px rgba(0,0,0,.43)}
.plaque b{display:block;padding:7px 11px;border:1px solid rgba(255,240,197,.8);background:#6f211c;color:#fde5a9;font-family:serif;font-size:14px;letter-spacing:.16em}
.copy{position:absolute;z-index:2;left:22px;bottom:35px;max-width:300px;color:#fff0cf;text-shadow:0 3px 16px rgba(0,0,0,.88)}
.copy small{display:block;color:#efca84;letter-spacing:.25em;font-size:10px;margin-bottom:10px}
.copy h1{margin:0;font-family:serif;font-size:38px;letter-spacing:.16em;line-height:1.1}
.copy p{margin:12px 0 0;font-size:15px;letter-spacing:.05em;line-height:1.6}
.main{padding:31px 16px 56px;background:linear-gradient(180deg,#1f160f 0,#f4ead9 7%,#f8f0e3 100%)}
.heading{display:flex;align-items:center;gap:10px;margin:0 0 8px;color:var(--ink);font-family:serif;font-size:24px;letter-spacing:.08em}
.heading:before{content:"";width:20px;height:20px;transform:rotate(45deg);border:1px solid #d8af69;background:linear-gradient(135deg,#942f27,#4b1510)}
.heading:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--gold),transparent)}
.notice{margin:0 0 18px;padding:14px 15px;border-left:4px solid var(--red);border-radius:7px;background:#efe1cb;color:#624f3d;font-size:13px;line-height:1.7}
.filters{display:flex;gap:8px;overflow:auto;padding:4px 0 14px}
.filter{flex:0 0 auto;border:1px solid #d1a75f;border-radius:99px;padding:7px 10px;background:#fffaf1;color:#6b4a27;font-size:12px}
.filter.active{background:#7e2922;color:#ffecc0;border-color:#7e2922}
.list{display:grid;gap:12px}
.post{padding:0;border:1px solid #dac4a1;border-radius:9px;background:#fffaf1;overflow:hidden;box-shadow:0 10px 21px rgba(48,29,12,.07)}
.post summary{list-style:none;cursor:pointer;padding:17px;position:relative}
.post summary::-webkit-details-marker{display:none}
.post summary:after{content:"＋";position:absolute;right:17px;top:17px;color:#9b6e32;font-size:22px}
.post[open] summary:after{content:"－"}
.meta{display:flex;align-items:center;gap:8px;margin-bottom:9px;color:#98723c;font-size:10px;letter-spacing:.1em}
.badge{border:1px solid #d4ad6b;border-radius:99px;padding:3px 7px;background:#f8ebd5}
.badge.pin{background:#e2f0e7;color:#276249;border-color:#a8c9b1}
.post h2{margin:0;color:#3b2a1b;font-family:serif;font-size:21px;line-height:1.4;padding-right:26px}
.post .brief{margin:8px 0 0;color:#715f4c;font-size:13px;line-height:1.7}
.detail{padding:0 17px 17px;border-top:1px solid #eadbc3;color:#695a49;font-size:14px;line-height:1.8}
.detail p{margin:14px 0 0}
.empty{padding:17px;border:1px solid #dac4a1;border-radius:9px;background:#fffaf1;color:#715f4c;font-size:14px;line-height:1.8}
.footer{padding:35px 16px 46px;text-align:center;background:#0d0c0b;border-top:4px solid #7e2d26;color:#d7c4a9}
.footer b{font-family:serif;font-size:18px;letter-spacing:.14em}
.footer p{margin:9px 0 0;color:#9e907d;font-size:12px}
@media(min-width:620px){.hero{min-height:360px}.copy{left:32px;bottom:46px}.main{padding-left:28px;padding-right:28px}}
</style>
</head>
<body>
<div class="site">
<header class="top">
<a class="brand" href="home-about-top.html"><i>媽</i>木柵聖母宮</a>
<a class="back" href="home-about-top.html">← 回首頁</a>
</header>
<section class="hero">
<img src="0041A154-C38F-4661-9C74-E7A5234899BB.png?v=20260619-1155" alt="金色龍飾與宮廟屋脊">
<div class="plaque"><b>木柵聖母宮</b></div>
<div class="copy"><small>NEWS &amp; NOTICE</small><h1>最新公告</h1><p>重要訊息、活動內容與服務資訊。</p></div>
</section>
<main class="main">
<h2 class="heading">全部公告</h2>
<p class="notice" id="announcementStatus">正在讀取最新公告。</p>
<div class="filters" id="announcementFilters" aria-label="公告分類"></div>
<div class="list" id="announcementList" aria-live="polite"></div>
</main>
<footer class="footer"><b>木柵聖母宮</b><p>前台整合測試版｜公告資料由公告管理系統同步。</p></footer>
</div>

<script src="home-about-top.js?v=20260623-2"></script>
<script>
(function () {
  var filters = document.getElementById("announcementFilters");
  var list = document.getElementById("announcementList");
  var status = document.getElementById("announcementStatus");
  var allPosts = [];
  var activeCategory = "all";

  function annEscape(value) {
    return String(value == null ? "" : value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll(String.fromCharCode(34), "&quot;")
      .replaceAll(String.fromCharCode(39), "&#039;");
  }

  function annText(value) {
    var text = annEscape(value);
    return text
      .split(String.fromCharCode(13, 10)).join("<br>")
      .split(String.fromCharCode(10)).join("<br>");
  }

  function annDate(value) {
    var date = new Date(value);
    if (Number.isNaN(date.getTime())) return "";
    return date.toLocaleDateString("zh-TW", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    });
  }

  function annBrief(value) {
    var text = String(value == null ? "" : value).replace(/\s+/g, " ").trim();
    if (!text) return "請展開查看完整公告內容。";
    return text.length > 58 ? text.slice(0, 58) + "…" : text;
  }

  function renderFilters() {
    var categories = [];
    allPosts.forEach(function (post) {
      if (categories.indexOf(post.category) === -1) categories.push(post.category);
    });

    var items = [{ key: "all", label: "全部公告" }].concat(
      categories.map(function (category) {
        return { key: category, label: category };
      })
    );

    filters.innerHTML = items.map(function (item) {
      var isActive = item.key === activeCategory;
      return '<button class="filter' + (isActive ? " active" : "") + '" type="button" data-category="' +
        annEscape(item.key) + '" aria-pressed="' + (isActive ? "true" : "false") + '">' +
        annEscape(item.label) + "</button>";
    }).join("");

    filters.querySelectorAll(".filter").forEach(function (button) {
      button.addEventListener("click", function () {
        activeCategory = button.dataset.category;
        renderFilters();
        renderPosts();
      });
    });
  }

  function renderPosts() {
    var visiblePosts = activeCategory === "all"
      ? allPosts
      : allPosts.filter(function (post) {
          return post.category === activeCategory;
        });

    if (visiblePosts.length === 0) {
      list.innerHTML = '<div class="empty">目前沒有這個分類的公告。</div>';
      return;
    }

    list.innerHTML = visiblePosts.map(function (post, index) {
      var date = annDate(post.publishedAt);
      var meta = '<span class="badge">' + annEscape(post.category) + "</span>" +
        (post.pinned ? '<span class="badge pin">置頂公告</span>' : "") +
        (date ? "<span>" + annEscape(date) + "</span>" : "");

      return '<details class="post"' + (index === 0 ? " open" : "") + ">" +
        '<summary><div class="meta">' + meta + "</div>" +
        "<h2>" + annEscape(post.title) + "</h2>" +
        '<p class="brief">' + annEscape(annBrief(post.content)) + "</p></summary>" +
        '<div class="detail"><p>' + annText(post.content || "請查看完整公告內容。") + "</p></div>" +
        "</details>";
    }).join("");
  }

  function showMessage(message) {
    status.textContent = message;
  }

  async function loadAnnouncements() {
    if (typeof SUPABASE_URL === "undefined" || typeof SUPABASE_PUBLISHABLE_KEY === "undefined") {
      showMessage("公告設定尚未載入，請稍後重新整理。");
      list.innerHTML = '<div class="empty">公告暫時無法同步。</div>';
      return;
    }

    var url = SUPABASE_URL +
      "/rest/v1/announcements?select=category,title,content,is_pinned,published_at" +
      "&status=eq.published" +
      "&order=is_pinned.desc,published_at.desc.nullslast";

    try {
      var response = await fetch(url, {
        headers: {
          apikey: SUPABASE_PUBLISHABLE_KEY,
          Accept: "application/json"
        },
        cache: "no-store"
      });

      if (!response.ok) throw new Error("公告讀取失敗：" + response.status);

      var rows = await response.json();
      allPosts = Array.isArray(rows) ? rows.map(function (row) {
        return {
          category: row.category || "公告",
          title: row.title || "未命名公告",
          content: row.content || "請查看完整公告內容。",
          pinned: Boolean(row.is_pinned),
          publishedAt: row.published_at || ""
        };
      }) : [];

      if (allPosts.length === 0) {
        showMessage("目前沒有顯示中的公告。");
        list.innerHTML = '<div class="empty">最新消息將由本宮公告。</div>';
        return;
      }

      showMessage("本宮最新消息、活動與服務資訊。");
      renderFilters();
      renderPosts();
    } catch (error) {
      console.error(error);
      showMessage("公告暫時無法同步，請稍後重新整理。");
      list.innerHTML = '<div class="empty">公告暫時無法同步，請稍後重新整理。</div>';
    }
  }

  loadAnnouncements();
}());
</script>
</body>
</html>
