<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>木柵聖母宮｜生日換算測試 V3</title>
  <style>
    :root{--ink:#3b2a1b;--paper:#f7efe3;--card:#fffaf1;--red:#8d3028;--gold:#cba15b;--line:#d9c39f;--green:#276249;--muted:#725f4c}
    *{box-sizing:border-box}
    body{margin:0;background:#0d0c0b;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif}
    .site{max-width:820px;min-height:100vh;margin:auto;background:var(--paper)}
    .top{padding:17px 16px;background:#16120f;color:#f7e4ba;border-bottom:3px solid #7e2d26}
    .top b{font-family:serif;font-size:20px;letter-spacing:.14em}
    .top small{display:block;margin-top:6px;color:#d9b777;font-size:12px;letter-spacing:.06em}
    main{padding:28px 16px 56px}
    h1{display:flex;align-items:center;gap:10px;margin:0 0 10px;font-family:serif;font-size:30px;letter-spacing:.08em}
    h1:before{content:"";width:20px;height:20px;transform:rotate(45deg);background:var(--red);border:1px solid #d8af69}
    .lead{margin:0 0 20px;color:var(--muted);line-height:1.75}
    .card,.result{padding:18px;background:var(--card);border:1px solid var(--line);border-radius:12px}
    .mode{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
    .mode button{height:48px;border:1px solid #cbb38d;border-radius:8px;background:#fffaf1;color:#725f4c;font-size:16px;font-weight:700}
    .mode button.active{background:#7c2c25;color:#fff0cd;border-color:#7c2c25}
    .fieldLabel{display:block;margin-bottom:10px;font-size:15px;font-weight:700}
    .fieldLabel span{font-weight:400;color:#806c58}
    .dateFields{display:grid;grid-template-columns:1.25fr .8fr .8fr;gap:10px}
    .dateFields div{position:relative}
    .dateFields input{width:100%;height:54px;padding:0 11px;border:1px solid #cbb38d;border-radius:8px;background:#fffdf8;color:var(--ink);font-size:22px;font-weight:700;text-align:center}
    .dateFields span{display:block;margin-top:6px;text-align:center;color:#876f57;font-size:13px}
    input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}
    .helper{margin:10px 0 0;color:#816d59;font-size:13px;line-height:1.6}
    .pickerWrap{margin-top:20px;padding-top:16px;border-top:1px dashed #d9c39f}
    .pickerWrap label{display:block;margin-bottom:8px;font-size:15px;font-weight:700}
    .pickerWrap label span{font-weight:400;color:#806c58}
    .pickerWrap input{width:100%;height:54px;padding:0 13px;border:1px solid #cbb38d;border-radius:8px;background:#fffdf8;color:var(--ink);font-size:18px}
    .primary{width:100%;height:54px;margin-top:18px;border:0;border-radius:8px;background:linear-gradient(135deg,#8d3028,#5b1e19);color:#fff0cd;font-size:18px;font-weight:700;letter-spacing:.06em}
    .result{display:none;margin-top:18px}
    .result.show{display:block}
    .tag{display:inline-block;padding:4px 9px;border:1px solid #a8c9b1;border-radius:99px;background:#e8f4ea;color:var(--green);font-size:12px}
    .result h2{margin:12px 0 8px;font-family:serif;font-size:28px;line-height:1.35}
    .result p{margin:6px 0;color:#705f4d;line-height:1.7}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .item{padding:12px;border:1px solid #ead8b9;border-radius:9px;background:#fffaf1}
    .item.wide{grid-column:1 / -1}
    .item small{display:block;color:#8a745d;font-size:12px}
    .item b{display:block;margin-top:5px;font-size:16px;line-height:1.45}
    .error{display:none;margin-top:14px;padding:13px;border:1px solid #d89e93;border-radius:8px;background:#fff1ed;color:#87342c;line-height:1.6}
    .error.show{display:block}
    .hint{margin-top:20px;padding:14px;border-left:3px solid var(--gold);background:#fff7e9;color:#705f4d;font-size:13px;line-height:1.75}
  </style>
</head>
<body>
  <div class="site">
    <header class="top">
      <b>木柵聖母宮</b>
      <small>國曆／民國生日 → 農曆生日｜分欄輸入測試 V3</small>
    </header>
    <main>
      <h1>生日換算</h1>
      <p class="lead">改成「年、月、日」分開輸入，手機數字鍵盤即可完成，不需要斜線。</p>

      <section class="card">
        <div class="mode">
          <button id="westernMode" class="active" type="button">輸入西元生日</button>
          <button id="rocMode" type="button">輸入民國生日</button>
        </div>

        <span id="fieldLabel" class="fieldLabel">西元生日 <span>（直接填年、月、日）</span></span>
        <div class="dateFields">
          <div><input id="yearInput" type="number" inputmode="numeric" placeholder="1986" min="1" max="2100"><span id="yearText">西元年</span></div>
          <div><input id="monthInput" type="number" inputmode="numeric" placeholder="9" min="1" max="12"><span>月</span></div>
          <div><input id="dayInput" type="number" inputmode="numeric" placeholder="6" min="1" max="31"><span>日</span></div>
        </div>
        <p id="helper" class="helper">範例：年填 1986、月填 9、日填 6。</p>

        <div class="pickerWrap">
          <label for="solarPicker">國曆日期選單 <span>（保留給習慣選日期的人）</span></label>
          <input id="solarPicker" type="date" min="1900-01-31" max="2100-12-31">
          <p class="helper">選單一律用西元日期；選完會自動填入上方三格並換算。</p>
        </div>

        <button id="convertBtn" class="primary" type="button">立即換算農曆生日</button>
        <div id="error" class="error"></div>
      </section>

      <section id="result" class="result" aria-live="polite">
        <span class="tag">換算結果</span>
        <h2 id="lunarFull">—</h2>
        <p id="sourceDate">—</p>
        <p id="solarFull">—</p>
        <div class="grid">
          <div class="item"><small>農曆月日</small><b id="lunarMonthDay">—</b></div>
          <div class="item"><small>是否閏月</small><b id="isLeapMonth">—</b></div>
          <div class="item wide"><small>生肖</small><b id="zodiac">—</b></div>
        </div>
      </section>

      <div class="hint">這一版專門解決手機數字鍵盤沒有斜線的問題。正式納入點燈、安太歲時，也會用相同的分欄設計。</div>
    </main>
  </div>

  <script>
    const westernMode=document.getElementById('westernMode');
    const rocMode=document.getElementById('rocMode');
    const fieldLabel=document.getElementById('fieldLabel');
    const yearText=document.getElementById('yearText');
    const helper=document.getElementById('helper');
    const yearInput=document.getElementById('yearInput');
    const monthInput=document.getElementById('monthInput');
    const dayInput=document.getElementById('dayInput');
    const solarPicker=document.getElementById('solarPicker');
    const convertBtn=document.getElementById('convertBtn');
    const result=document.getElementById('result');
    const errorBox=document.getElementById('error');
    const lunarFull=document.getElementById('lunarFull');
    const sourceDate=document.getElementById('sourceDate');
    const solarFull=document.getElementById('solarFull');
    const lunarMonthDay=document.getElementById('lunarMonthDay');
    const isLeapMonth=document.getElementById('isLeapMonth');
    const zodiac=document.getElementById('zodiac');
    let mode='western';
    let debounceTimer=null;
    const ZODIAC_BY_BRANCH={子:'鼠',丑:'牛',寅:'虎',卯:'兔',辰:'龍',巳:'蛇',午:'馬',未:'羊',申:'猴',酉:'雞',戌:'狗',亥:'豬'};
    const CN=['零','一','二','三','四','五','六','七','八','九','十'];

    function clearInputs(){yearInput.value='';monthInput.value='';dayInput.value='';result.classList.remove('show');errorBox.classList.remove('show')}
    function setMode(next){
      mode=next;
      westernMode.classList.toggle('active',mode==='western');
      rocMode.classList.toggle('active',mode==='roc');
      if(mode==='western'){
        fieldLabel.innerHTML='西元生日 <span>（直接填年、月、日）</span>';
        yearInput.placeholder='1986'; yearText.textContent='西元年';
        helper.textContent='範例：年填 1986、月填 9、日填 6。';
      }else{
        fieldLabel.innerHTML='民國生日 <span>（直接填年、月、日）</span>';
        yearInput.placeholder='75'; yearText.textContent='民國年';
        helper.textContent='範例：年填 75、月填 9、日填 6。系統會自動換成西元 1986 年。';
      }
      clearInputs();yearInput.focus();
    }
    function getData(){
      let year=Number(yearInput.value),month=Number(monthInput.value),day=Number(dayInput.value);
      if(!Number.isInteger(year)||!Number.isInteger(month)||!Number.isInteger(day)) return null;
      const sourceYear=year;
      if(mode==='roc') year+=1911;
      const date=new Date(Date.UTC(year,month-1,day,4,0,0));
      if(year<1900||year>2100||date.getUTCFullYear()!==year||date.getUTCMonth()!==month-1||date.getUTCDate()!==day) return null;
      return {year,month,day,date,source:`${mode==='roc'?'民國':'西元'}${sourceYear}年${month}月${day}日`};
    }
    function chineseMonth(raw){
      const value=String(raw||'').replace(/\s/g,'').replace(/闰/g,'閏');
      if(/^[閏]?[正冬臘一二三四五六七八九十]+月$/.test(value)) return value;
      const digits=value.replace(/[^0-9]/g,'');
      if(!digits) return value||'—';
      const n=Number(digits);
      const label=n===1?'正':n===11?'冬':n===12?'臘':CN[n]||String(n);
      return `${/閏/.test(value)?'閏':''}${label}月`;
    }
    function chineseDay(raw){
      const value=String(raw||'').replace(/\s/g,'');
      if(/^(初[一二三四五六七八九十]|十[一二三四五六七八九]?|二十|廿[一二三四五六七八九]|三十)$/.test(value)) return value;
      const digits=value.replace(/[^0-9]/g,'');
      if(!digits) return value||'—';
      const n=Number(digits);
      if(n<=10)return`初${CN[n]}`;
      if(n<20)return`十${CN[n-10]}`;
      if(n===20)return'二十';
      if(n<30)return`廿${CN[n-20]}`;
      return'三十';
    }
    function convert(showError=true){
      errorBox.classList.remove('show');
      const data=getData();
      if(!data){
        result.classList.remove('show');
        if(showError){errorBox.textContent=mode==='roc'?'請完整填入民國年、月、日，例如：75、9、6。':'請完整填入西元年、月、日，例如：1986、9、6。';errorBox.classList.add('show')}
        return;
      }
      try{
        const formatter=new Intl.DateTimeFormat('zh-TW-u-ca-chinese',{year:'numeric',month:'long',day:'numeric',timeZone:'Asia/Taipei'});
        const full=formatter.format(data.date);
        const pieces=formatter.formatToParts(data.date);
        const rawMonth=pieces.find(p=>p.type==='month')?.value||'';
        const rawDay=pieces.find(p=>p.type==='day')?.value||'';
        const stem=String(full).match(/[甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥]/)?.[0]||'';
        const animal=stem?ZODIAC_BY_BRANCH[stem[1]]||'':'';
        const cMonth=chineseMonth(rawMonth),cDay=chineseDay(rawDay);
        lunarFull.textContent=`農曆：${stem?stem+'年':''}${cMonth}${cDay}${animal?`（${animal}年）`:''}`;
        sourceDate.textContent=`原始輸入：${data.source}`;
        solarFull.textContent=`國曆：${data.year} 年 ${data.month} 月 ${data.day} 日`;
        lunarMonthDay.textContent=`${cMonth}${cDay}`;
        isLeapMonth.textContent=/閏|闰/.test(full+rawMonth)?'是，請宮務人員確認辦理月份':'否';
        zodiac.textContent=animal?`${animal}年（${stem}）`:'此裝置未提供生肖資料';
        result.classList.add('show');
      }catch(err){errorBox.textContent='此手機瀏覽器暫時無法換算農曆。';errorBox.classList.add('show')}
    }
    function autoConvert(){clearTimeout(debounceTimer);debounceTimer=setTimeout(()=>{if(getData())convert(false)},300)}
    westernMode.addEventListener('click',()=>setMode('western'));rocMode.addEventListener('click',()=>setMode('roc'));
    [yearInput,monthInput,dayInput].forEach(el=>el.addEventListener('input',autoConvert));
    convertBtn.addEventListener('click',()=>convert(true));
    solarPicker.addEventListener('change',()=>{
      if(!solarPicker.value)return;
      const [y,m,d]=solarPicker.value.split('-').map(Number);
      mode='western';westernMode.classList.add('active');rocMode.classList.remove('active');
      fieldLabel.innerHTML='西元生日 <span>（直接填年、月、日）</span>';yearInput.placeholder='1986';yearText.textContent='西元年';helper.textContent='範例：年填 1986、月填 9、日填 6。';
      yearInput.value=y;monthInput.value=m;dayInput.value=d;convert(true);
    });
  </script>
</body>
</html>
