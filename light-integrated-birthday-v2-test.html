<!doctype html>
<html lang="zh-Hant">
<head>

<title>點燈祈福｜生日換算整合測試｜木柵聖母宮</title>
<style>
:root{--gold:#cba15b;--pale:#f4deae;--red:#8d3028;--paper:#f7efe3;--ink:#382719;--muted:#756653;--line:#dac4a1;--good:#236247}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#070706;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;color:var(--ink)}
.site{max-width:820px;margin:auto;min-height:100vh;background:var(--paper);overflow:hidden}.top{height:62px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:#12100e;border-bottom:1px solid rgba(207,163,91,.42)}.brand{color:#f5e2b4;text-decoration:none;font-family:serif;font-size:18px;font-weight:800;letter-spacing:.13em}.seal{display:inline-grid;place-items:center;width:30px;height:30px;margin-right:8px;border:1px solid var(--pale);border-radius:50%;background:radial-gradient(circle at 34% 26%,#c95341,#5b1a16 73%)}.back{color:#d8b979;text-decoration:none;font-size:12px}
.hero{padding:44px 22px 37px;background:linear-gradient(135deg,#4b1814,#120d0b 72%);color:#fff0cf;border-bottom:4px solid #7e2d26}.hero small{display:block;color:#efca84;letter-spacing:.25em;font-size:10px;margin-bottom:10px}.hero h1{margin:0;font-family:serif;font-size:38px;letter-spacing:.15em}.hero p{margin:12px 0 0;font-size:14px;line-height:1.8;color:#e3cfaa}
.main{padding:0 16px 56px;background:#f8f0e3}.notice{margin:0 -16px;padding:20px 16px 16px;background:#f0e2cc;border-bottom:1px solid #d9c2a0;color:#624f3d;font-size:13px;line-height:1.75}.notice b{color:#3c2a1b}.section{margin-top:31px}.heading{display:flex;align-items:center;gap:10px;margin:0 0 11px;color:var(--ink);font-family:serif;font-size:24px;letter-spacing:.08em}.heading:before{content:"";width:19px;height:19px;transform:rotate(45deg);border:1px solid #d8af69;background:linear-gradient(135deg,#942f27,#4b1510)}.heading:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--gold),transparent)}.intro{margin:0;color:#6d5f4f;font-size:14px;line-height:1.9}
.tabs{display:flex;gap:8px;overflow:auto;margin:14px 0}.tabs button{white-space:nowrap;border:1px solid #d0b58d;border-radius:99px;background:#fffaf1;color:#5d4222;padding:9px 13px;font:inherit;font-size:13px}.tabs button.active{background:#76241d;color:#f8e3ba;border-color:#76241d}.panel{display:none}.panel.active{display:block}
.form,.lookup{display:grid;gap:12px;padding:18px;border:1px solid var(--line);border-radius:9px;background:#fffaf1}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:grid;gap:5px}.field label{font-size:13px;font-weight:700;color:#4b4b48}.field input,.field select,.field textarea{width:100%;border:1px solid #d8cbb8;border-radius:11px;background:#fffefa;padding:12px;font:inherit;color:var(--ink)}.field textarea{min-height:88px;resize:vertical}.field input[readonly]{background:#f2ece2;color:#5e4d3c}.help{margin:0;color:#806d56;font-size:12px;line-height:1.6}.btn{width:100%;border:0;border-radius:12px;padding:14px 13px;font-weight:800;font-size:16px;cursor:pointer;background:linear-gradient(145deg,#8c3028,#4d1814);border:1px solid #dcb56f;color:#ffebbd}
.birthPanel{margin:3px 0;padding:15px;border:1px solid #d5bd93;border-radius:10px;background:#fff8ec}.birthPanel h3{margin:0 0 8px;font-size:18px;font-family:serif}.birthPanel p{margin:0;color:#705d49;font-size:13px;line-height:1.65}.birthModes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:13px 0}.birthModes button{height:46px;border:1px solid #cdb68f;border-radius:9px;background:#fffaf1;color:#765f46;font-size:15px;font-weight:800}.birthModes button.active{background:#76241d;border-color:#76241d;color:#ffe9ba}.dateRow{display:grid;grid-template-columns:1.2fr .8fr .8fr;gap:8px;margin-top:9px}.dateCell input{width:100%;height:50px;padding:8px;border:1px solid #d8cbb8;border-radius:9px;background:#fffdf8;font-size:20px;font-weight:800;text-align:center}.dateCell span{display:block;margin-top:5px;text-align:center;color:#806a53;font-size:12px}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}input[type=number]{-moz-appearance:textfield}.picker{margin-top:15px;padding-top:13px;border-top:1px dashed #d4bd95}.picker label{display:block;margin-bottom:7px;font-size:14px;font-weight:700}.picker input{width:100%;height:50px;padding:10px;border:1px solid #d8cbb8;border-radius:9px;background:#fffdf8;font:inherit}.birthPreview{display:none;margin-top:14px;padding:13px;border:1px solid #b8d5be;border-radius:10px;background:#eff8f0;line-height:1.72}.birthPreview.show{display:block}.birthPreview b{display:block;font-size:17px;color:#275840}.birthPreview span{display:block;margin-top:5px;color:#5f725f;font-size:13px}.birthError{display:none;margin-top:13px;padding:11px;border:1px solid #d89e93;border-radius:9px;background:#fff1ed;color:#87342c;line-height:1.6;font-size:13px}.birthError.show{display:block}
.result{margin-top:14px;border-radius:12px;padding:15px;background:#e9f4ee;color:var(--good);line-height:1.75}.result h3{margin:0 0 6px;font-size:18px}.result p{margin:0;font-size:14px}.lookup-result{margin-top:14px}.record{padding:16px;border:1px solid #ccd9cf;border-radius:9px;background:#f3faf5}.record h3{margin:0;color:#224b35;font-size:18px}.record p{margin:7px 0 0;color:#4d6556;font-size:13px;line-height:1.72}.badge{display:inline-block;padding:3px 8px;margin:7px 5px 0 0;border-radius:99px;font-size:11px;font-weight:800;background:#fff0cf;color:#855a12}.callout{padding:17px;border-left:4px solid var(--red);border-radius:7px;background:#f1e2cc;color:#685644;font-size:13px;line-height:1.8}.callout b{display:block;color:#3d2b1a;font-family:serif;font-size:18px}.footer{margin:34px -16px -56px;padding:37px 16px 48px;text-align:center;background:#0d0c0b;border-top:4px solid #7e2d26;color:#d7c4a9}.footer b{font-family:serif;font-size:18px;letter-spacing:.14em}.footer p{margin:9px 0 0;color:#9e907d;font-size:12px}
@media(max-width:430px){.row{grid-template-columns:1fr}.dateRow{grid-template-columns:1.15fr .8fr .8fr}}@media(min-width:620px){.main{padding-left:28px;padding-right:28px}.notice,.footer{margin-left:-28px;margin-right:-28px;padding-left:28px;padding-right:28px}}
</style>
</head>
<body>
<div class="site">
<header class="top"><a class="brand" href="home-about-top.html"><span class="seal">媽</span>木柵聖母宮</a><a class="back" href="home-about-top.html">← 回首頁</a></header>
<section class="hero"><small>LIGHT OFFERING · TEST</small><h1>點燈祈福</h1><p>以一盞心燈，祈願平安順遂。</p></section>
<main class="main">
<div class="notice"><b>點燈祈福生日換算整合測試頁。</b><br>資料只存在這台裝置的瀏覽器，請勿填入真實個人資料。</div>
<section class="section" id="action"><h2 class="heading">登記／查詢</h2><p class="intro">國曆、民國生日皆可輸入；系統會自動帶出農曆生日、生肖與閏月提醒。</p>
<div class="tabs"><button class="active" data-tab="register">測試登記</button><button data-tab="lookup">登記查詢</button></div>
<div class="panel active" id="register"><form class="form" id="registerForm"><p class="help">請使用假姓名與假電話。送出後會產生一組點燈測試碼。</p>
<div class="row"><div class="field"><label for="name">登記人姓名</label><input id="name" required placeholder="例如：測試香客A"></div><div class="field"><label for="phone">手機號碼</label><input id="phone" required inputmode="numeric" pattern="[0-9]{8,10}" placeholder="例如：0912345678"></div></div>
<div class="row"><div class="field"><label for="lampType">燈別</label><select id="lampType"><option>平安燈</option><option>光明燈</option><option>財利燈</option></select></div><div class="field"><label for="target">祈福對象</label><input id="target" required placeholder="例如：測試對象A"></div></div>
<section class="birthPanel"><h3>生日自動換算</h3><p>年、月、日分開輸入，不需輸入斜線。可用西元或民國年。</p><div class="birthModes"><button id="westernMode" class="active" type="button">輸入西元生日</button><button id="rocMode" type="button">輸入民國生日</button></div><div class="dateRow"><label class="dateCell"><input id="birthYear" type="number" inputmode="numeric" min="1" max="2100" placeholder="1986"><span id="yearLabel">西元年</span></label><label class="dateCell"><input id="birthMonth" type="number" inputmode="numeric" min="1" max="12" placeholder="9"><span>月</span></label><label class="dateCell"><input id="birthDay" type="number" inputmode="numeric" min="1" max="31" placeholder="6"><span>日</span></label></div><div class="picker"><label for="birthPicker">國曆日期選單（保留）</label><input id="birthPicker" type="date" min="1900-01-31" max="2100-12-31"></div><div id="birthPreview" class="birthPreview"><b id="lunarDisplay">—</b><span id="birthDetail">—</span></div><div id="birthError" class="birthError"></div></section>
<div class="row"><div class="field"><label for="lunarBirth">農曆生日（系統自動帶入）</label><input id="lunarBirth" readonly placeholder="填寫生日後自動顯示"></div><div class="field"><label for="zodiac">生肖（系統自動帶入）</label><input id="zodiac" readonly placeholder="填寫生日後自動顯示"></div></div>
<div class="field"><label for="note">祈願／備註（可留白）</label><textarea id="note" placeholder="例如：平安、順遂（測試可留白）"></textarea></div><button class="btn" type="submit">送出點燈測試登記</button></form><div class="result" id="registerResult" hidden></div></div>
<div class="panel" id="lookup"><div class="lookup"><p class="help">可先測試預設資料：點燈碼 <b>LMP-2026-0001</b>，手機末四碼 <b>1234</b>；或查詢剛剛建立的測試登記。</p><div class="field"><label for="code">點燈碼</label><input id="code" placeholder="例如：LMP-2026-0001"></div><div class="field"><label for="last4">手機末四碼</label><input id="last4" inputmode="numeric" maxlength="4" placeholder="例如：1234"></div><button class="btn" id="lookupBtn" type="button">查詢測試資料</button></div><div class="lookup-result" id="lookupResult"></div></div>
</section>
<footer class="footer"><b>木柵聖母宮</b><p>點燈祈福｜生日換算整合測試版｜不連接正式資料庫或金流。</p></footer>
</main></div>
<script>
const KEY='msm_v1_demo_state';
const fallback={lampSeq:1,lamps:[{id:'LMP-2026-0001',name:'測試點燈信眾',phone:'0912001234',type:'平安燈',target:'測試對象',birth:'',zodiac:'',note:'測試資料',status:'待確認',created:'2026-06-19'}]};
function clone(v){return JSON.parse(JSON.stringify(v))}
function load(){try{const x=JSON.parse(localStorage.getItem(KEY));if(x){if(!Array.isArray(x.lamps))x.lamps=clone(fallback.lamps);if(!x.lampSeq)x.lampSeq=1;return x}}catch(e){}return clone(fallback)}
let state=load();
const by=id=>document.getElementById(id);
const Z={子:'鼠',丑:'牛',寅:'虎',卯:'兔',辰:'龍',巳:'蛇',午:'馬',未:'羊',申:'猴',酉:'雞',戌:'狗',亥:'豬'};const CN=['零','一','二','三','四','五','六','七','八','九','十'];let mode='western',timer=null;
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function escapeHtml(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function cMonth(raw){const v=String(raw||'').replace(/\s/g,'').replace(/闰/g,'閏');if(/^[閏]?[正冬臘一二三四五六七八九十]+月$/.test(v))return v;const d=v.replace(/[^0-9]/g,'');if(!d)return v||'—';const n=Number(d),label=n===1?'正':n===11?'冬':n===12?'臘':CN[n]||String(n);return `${/閏/.test(v)?'閏':''}${label}月`}
function cDay(raw){const v=String(raw||'').replace(/\s/g,'');if(/^(初[一二三四五六七八九十]|十[一二三四五六七八九]?|二十|廿[一二三四五六七八九]|三十)$/.test(v))return v;const d=v.replace(/[^0-9]/g,'');if(!d)return v||'—';const n=Number(d);if(n<=10)return`初${CN[n]}`;if(n<20)return`十${CN[n-10]}`;if(n===20)return'二十';if(n<30)return`廿${CN[n-20]}`;return'三十'}
function setMode(next){mode=next;by('westernMode').classList.toggle('active',mode==='western');by('rocMode').classList.toggle('active',mode==='roc');by('birthYear').value='';by('birthMonth').value='';by('birthDay').value='';by('yearLabel').textContent=mode==='roc'?'民國年':'西元年';by('birthYear').placeholder=mode==='roc'?'75':'1986';by('birthPreview').classList.remove('show');by('birthError').classList.remove('show');by('lunarBirth').value='';by('zodiac').value=''}
function birthdayData(){let y=Number(by('birthYear').value),m=Number(by('birthMonth').value),d=Number(by('birthDay').value);if(!Number.isInteger(y)||!Number.isInteger(m)||!Number.isInteger(d))return null;const source=`${mode==='roc'?'民國':'西元'}${y}年${m}月${d}日`;if(mode==='roc')y+=1911;const date=new Date(Date.UTC(y,m-1,d,4,0,0));if(y<1900||y>2100||date.getUTCFullYear()!==y||date.getUTCMonth()!==m-1||date.getUTCDate()!==d)return null;return{y,m,d,date,source}}
function convert(showError=false){by('birthError').classList.remove('show');const data=birthdayData();if(!data){by('birthPreview').classList.remove('show');by('lunarBirth').value='';by('zodiac').value='';if(showError){by('birthError').textContent=mode==='roc'?'請完整填入民國年、月、日，例如：75、9、6。':'請完整填入西元年、月、日，例如：1986、9、6。';by('birthError').classList.add('show')}return null}try{const f=new Intl.DateTimeFormat('zh-TW-u-ca-chinese',{year:'numeric',month:'long',day:'numeric',timeZone:'Asia/Taipei'}),full=f.format(data.date),parts=f.formatToParts(data.date),rm=parts.find(p=>p.type==='month')?.value||'',rd=parts.find(p=>p.type==='day')?.value||'',stem=String(full).match(/[甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥]/)?.[0]||'',animal=stem?Z[stem[1]]||'':'',leap=/閏|闰/.test(full+rm),lunar=`${stem?stem+'年':''}${cMonth(rm)}${cDay(rd)}${animal?`（${animal}年）`:''}`;by('lunarBirth').value=lunar;by('zodiac').value=animal?`${animal}年（${stem}）`:'請人工確認生肖';by('lunarDisplay').textContent=`農曆：${lunar}`;by('birthDetail').textContent=`國曆 ${data.y} 年 ${data.m} 月 ${data.d} 日｜${leap?'閏月，請宮務確認辦理月份':'非閏月'}`;by('birthPreview').classList.add('show');return{lunar,animal,leap,solar:`${data.y}/${String(data.m).padStart(2,'0')}/${String(data.d).padStart(2,'0')}`,source:data.source}}catch(e){by('birthError').textContent='此手機瀏覽器暫時無法換算農曆。';by('birthError').classList.add('show');return null}}
function auto(){clearTimeout(timer);timer=setTimeout(()=>{if(birthdayData())convert(false)},300)}
by('westernMode').onclick=()=>setMode('western');by('rocMode').onclick=()=>setMode('roc');[by('birthYear'),by('birthMonth'),by('birthDay')].forEach(x=>x.addEventListener('input',auto));by('birthPicker').addEventListener('change',()=>{if(!by('birthPicker').value)return;const[y,m,d]=by('birthPicker').value.split('-').map(Number);mode='western';by('westernMode').classList.add('active');by('rocMode').classList.remove('active');by('yearLabel').textContent='西元年';by('birthYear').placeholder='1986';by('birthYear').value=y;by('birthMonth').value=m;by('birthDay').value=d;convert(true)});
document.querySelectorAll('.tabs button').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));btn.classList.add('active');by(btn.dataset.tab).classList.add('active')}));
by('registerForm').addEventListener('submit',e=>{e.preventDefault();const birthday=convert(true);if(!birthday){by('birthYear').focus();return}state.lampSeq=(state.lampSeq||1)+1;const r={id:'LMP-2026-'+String(state.lampSeq).padStart(4,'0'),name:by('name').value.trim(),phone:by('phone').value.trim(),type:by('lampType').value,target:by('target').value.trim(),birth:birthday.lunar,zodiac:birthday.animal?`${birthday.animal}年`:'',birthSolar:birthday.solar,birthInput:birthday.source,leapMonth:birthday.leap,note:by('note').value.trim()||'無',status:'待確認',created:new Date().toISOString().slice(0,10)};state.lamps.unshift(r);save();const box=by('registerResult');box.hidden=false;box.innerHTML=`<h3>點燈測試登記已建立</h3><p>點燈碼：<b>${escapeHtml(r.id)}</b><br>燈別：<b>${escapeHtml(r.type)}</b><br>農曆生日：${escapeHtml(r.birth)}<br>目前狀態：待確認。</p>`;e.target.reset();setMode('western')});
by('lookupBtn').onclick=()=>{const code=by('code').value.trim().toUpperCase(),last=by('last4').value.trim(),r=(state.lamps||[]).find(x=>x.id===code&&String(x.phone).slice(-4)===last),box=by('lookupResult');if(!r){box.innerHTML='<div class="callout"><b>查無測試資料</b>請確認點燈碼與手機末四碼。</div>';return}box.innerHTML=`<article class="record"><h3>${escapeHtml(r.name)}｜${escapeHtml(r.id)}</h3><span class="badge">${escapeHtml(r.status)}</span><p>燈別：${escapeHtml(r.type)}<br>祈福對象：${escapeHtml(r.target)}<br>農曆生日：${escapeHtml(r.birth||'未填寫')}${r.birthSolar?`（國曆 ${escapeHtml(r.birthSolar)}）`:''}<br>生肖：${escapeHtml(r.zodiac||'未填寫')}<br>備註：${escapeHtml(r.note)}</p></article>`};
save();
</script>
</body>
</html>
