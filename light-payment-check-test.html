<!doctype html><html lang="zh-Hant"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>點燈查詢修正測試</title><style>body{margin:0;background:#16110e;color:#382719;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif}.wrap{max-width:720px;min-height:100vh;margin:auto;padding:24px 16px;background:#f7efe3}.tag{color:#8d3028;font-size:12px;letter-spacing:.15em}.title{font-family:serif;font-size:31px;letter-spacing:.1em;margin:8px 0}.note{padding:13px;border-left:4px solid #8d3028;background:#f0e1ca;line-height:1.7;font-size:13px}.box{margin-top:20px;padding:18px;border:1px solid #dac4a1;border-radius:10px;background:#fffaf1}.field{display:grid;gap:6px;margin:12px 0}.field input{padding:12px;border:1px solid #d8cbb8;border-radius:10px;font-size:16px}.btn{width:100%;margin-top:10px;padding:14px;border:0;border-radius:10px;background:#76241d;color:#ffe7b7;font-size:16px;font-weight:800}.result{margin-top:15px;padding:16px;border:1px solid #bdd6c3;border-radius:10px;background:#f0f9f2;line-height:1.8}.pill{display:inline-block;margin-right:6px;padding:4px 9px;border-radius:99px;background:#dff1e8;color:#206043;font-size:12px;font-weight:800}.bad{background:#f8e7dc;color:#8a3428}</style><div class="wrap"><div class="tag">LIGHT OFFERING · DISPLAY FIX</div><h1 class="title">點燈繳費狀態查詢</h1><div class="note">修正原查詢頁只顯示「已確認」、但沒有顯示繳費狀態的問題。此頁直接讀取同一台手機的測試資料。</div><div class="box"><div class="field"><label>點燈碼</label><input id="code" placeholder="LMP-2026-0002"></div><div class="field"><label>手機末四碼</label><input id="last4" maxlength="4" inputmode="numeric" placeholder="4567"></div><button class="btn" id="go">查詢測試資料</button></div><div id="out"></div></div><script>const KEY='msm_v1_demo_state';document.getElementById('go').onclick=()=>{let s;try{s=JSON.parse(localStorage.getItem(KEY))}catch(e){}let id=code.value.trim().toUpperCase(),last=last4.value.trim(),r=s&&Array.isArray(s.lamps)&&s.lamps.find(x=>x.id===id&&String(x.phone).slice(-4)===last);if(!r){out.innerHTML='<div class="result">查無測試資料，請確認點燈碼與手機末四碼。</div>';return}let pay=r.pay||'未繳',payClass=pay==='已繳'?'pill':'pill bad';out.innerHTML=`<div class="result"><b>${r.name}｜${r.id}</b><br><span class="pill">${r.status||'待確認'}</span><span class="${payClass}">${pay}</span><br>燈別：${r.type}<br>祈福對象：${r.target}<br><b>繳費狀態：${pay}</b></div>`}</script></html>
