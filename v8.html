<style>

*{box-sizing:border-box}body{margin:0;background:#090807;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif}.site{max-width:820px;margin:auto;min-height:100vh;background:#f8f0e3;overflow:hidden}.bar{height:60px;padding:0 17px;display:flex;align-items:center;justify-content:space-between;background:#12100e;color:#f3dfb0;border-bottom:1px solid rgba(211,167,91,.45)}.brand{font-family:serif;font-size:18px;font-weight:800;letter-spacing:.13em}.brand i{font-style:normal;display:inline-grid;place-items:center;width:30px;height:30px;margin-right:8px;border-radius:50%;background:#7e2822;color:#ffe9b8;border:1px solid var(--pale)}.state{font-size:10px;letter-spacing:.06em;border:1px solid rgba(216,179,105,.55);border-radius:99px;padding:4px 8px;color:#d9b777}.hero{position:relative;min-height:340px;overflow:hidden;background:#7e6950}.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:58% 50%;filter:brightness(1.08) contrast(1.03) saturate(.94);opacity:0;transition:opacity .25s}.hero.loaded img{opacity:1}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(12,10,8,.48) 0%,rgba(12,10,8,.10) 57%,rgba(12,10,8,.08) 100%),linear-gradient(180deg,transparent 49%,rgba(8,6,5,.34) 100%);pointer-events:none}.copy{position:absolute;z-index:2;left:22px;bottom:31px;max-width:260px;color:#fff3d7;text-shadow:0 3px 16px rgba(0,0,0,.88)}.copy small{display:block;color:#f1cd88;font-size:10px;letter-spacing:.25em;margin-bottom:9px}.copy h1{font-family:serif;font-size:37px;letter-spacing:.16em;margin:0;line-height:1.1}.copy p{font-size:16px;letter-spacing:.06em;margin:12px 0 0;line-height:1.55}.line{width:88px;height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin-top:17px}.plaque{position:absolute;z-index:3;right:15px;top:18px;padding:6px;background:linear-gradient(145deg,#d8b16a,#5b3518,#e7c57e);box-shadow:0 8px 17px rgba(0,0,0,.4)}.plaque b{display:block;border:1px solid rgba(255,240,197,.78);background:#70221c;color:#fde4aa;padding:7px 11px;font-family:serif;font-size:14px;letter-spacing:.16em}.content{padding:31px 16px 55px;background:linear-gradient(180deg,#21170f 0,#f4ead9 8%,#f8f0e3 100%)}.heading{display:flex;align-items:center;gap:10px;margin:0 0 8px;color:var(--ink);font-family:serif;font-size:24px;letter-spacing:.08em}.heading:before{content:"";width:20px;height:20px;transform:rotate(45deg);background:linear-gradient(135deg,#902f27,#4b1612);border:1px solid #dcb36f}.heading:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--gold),transparent)}.sub{margin:0 0 17px;color:var(--muted);font-size:14px;line-height:1.7}.card{padding:17px;border-radius:8px;border:1px solid #d8c099;background:#fffaf1;box-shadow:0 12px 25px rgba(54,34,14,.08)}.card h2{margin:0 0 8px;font-family:serif;font-size:19px;color:#3a291a}.card p{margin:0;color:#6e6050;font-size:14px;line-height:1.75}.tiles{display:grid;gap:11px;margin-top:13px}.tile{padding:15px;border:1px solid rgba(204,161,89,.45);border-radius:7px;background:linear-gradient(145deg,#38261a,#17120f);color:#f7e4bc;text-decoration:none}.tile b{display:block;font-family:serif;font-size:19px;letter-spacing:.08em}.tile span{display:block;margin-top:4px;color:#d6c4a7;font-size:12px}.footer{padding:34px 16px 46px;text-align:center;background:#0d0c0b;border-top:4px solid #7e2d26;color:#d7c4a9}.footer b{font-family:serif;font-size:18px;letter-spacing:.14em}.footer p{margin:9px 0 0;font-size:12px;color:#9f917e}@media(min-width:620px){.hero{min-height:500px}.content{padding-left:28px;padding-right:28px}.copy{left:32px;bottom:48px}.tiles{grid-template-columns:repeat(3,1fr)}}
</style>

<body>
<div class="site"><header class="bar"><div class="brand"><i>媽</i>木柵聖母宮</div><span class="state">V8 明亮屋脊版</span></header><section class="hero" id="hero"><img id="roof" alt="生成屋脊與香煙背景"><div class="plaque"><b>木柵聖母宮</b></div><div class="copy"><small>ANNUAL PILGRIMAGE</small><h1>南巡進香</h1><p>屋脊與香煙保留在右側，文字放左側留白。</p><div class="line"></div></div></section><main class="content"><h2 class="heading">內頁背景設計</h2><p class="sub">版面與 V8 相同，只修正素材來源與顯示比例：不再把低解析預覽圖硬拉大，因此屋脊、龍飾與煙霧會保持清楚。</p><section class="card"><h2>版面配置</h2><p>右上：木柵聖母宮紅金牌匾。左下：南巡進香標題與短說明。下方正式表單、公告與查詢維持米白底，讓長輩容易閱讀。</p></section><div class="tiles"><a class="tile" href="index.html"><b>南巡進香</b><span>進入已驗證的報名流程</span></a><a class="tile" href="index.html"><b>點燈祈福</b><span>進入已驗證的點燈流程</span></a><a class="tile" href="index.html"><b>安太歲</b><span>進入已驗證的安太歲流程</span></a></div></main><footer class="footer"><b>木柵聖母宮</b><p>V8｜保留原構圖，僅提升屋脊素材清晰度。</p></footer></div>
