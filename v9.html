<main class="content"><h2 class="heading">內頁背景設計</h2><p class="sub">這版不使用低解析照片，因此不會出現馬賽克或整片發黑。屋脊、龍飾、金光與香煙以可縮放圖形繪製，手機放大仍清楚。</p><section class="card"><h2>正式採用方式</h2><p>南巡進香、廟史、交通聯絡使用「屋脊橫幅」；點燈祈福改用燈火橫幅；安太歲改用夜色屋脊。下方表單、公告、查詢維持淺底，以兼顧莊嚴與閱讀性。</p></section><div class="actions"><a class="action" href="index.html"><b>南巡進香</b><span>進入已驗證的報名流程</span></a><a class="action" href="index.html"><b>點燈祈福</b><span>進入已驗證的點燈流程</span></a><a class="action" href="index.html"><b>安太歲</b><span>進入已驗證的安太歲流程</span></a></div></main><footer class="footer"><b>木柵聖母宮</b><p>V9｜清晰屋脊與香煙內頁視覺測試。</p></footer></div>
