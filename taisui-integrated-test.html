<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>安太歲｜木柵聖母宮</title><style>body{margin:0;background:#17110e;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif;color:#382719}.w{max-width:720px;min-height:100vh;margin:auto;background:#f7efe3}.h{padding:32px 18px;background:linear-gradient(135deg,#65221b,#160e0c);color:#ffe7b7}.h h1{margin:8px 0;font-family:serif;letter-spacing:.12em;font-size:34px}.h p{margin:0;color:#dec7a1;font-size:14px;line-height:1.7}.m{padding:20px 16px}.n{padding:14px;border-left:4px solid #8d3028;background:#f0e1ca;line-height:1.7;font-size:13px}.b{margin-top:18px;padding:17px;border:1px solid #dac4a1;border-radius:10px;background:#fffaf1}.b h2{margin:0 0 8px;font-family:serif;font-size:22px}.f{display:grid;gap:6px;margin:12px 0}.f input,.f select,.f textarea{padding:12px;border:1px solid #d8cbb8;border-radius:10px;font:inherit}.f textarea{min-height:65px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.go{width:100%;padding:14px;border:0;border-radius:10px;background:#76241d;color:#ffe8b9;font-size:16px;font-weight:800}.r{margin-top:15px;padding:16px;border:1px solid #bfd8c5;border-radius:10px;background:#f0f9f2;line-height:1.85}.pill{display:inline-block;margin:7px 6px 0 0;padding:4px 9px;border-radius:99px;background:#fff0cf;color:#855a12;font-size:12px;font-weight:800}</style></head><body><div class="w"><header class="h"><small>PEACE RITUAL · TEST</small><h1>安太歲</h1><p>前台測試登記與查詢。年度費用與正式規範待宮方公告。</p></header><main class="m"><div class="n"><b>安太歲整合測試頁。</b><br>請使用假姓名與假電話；資料只存於這台裝置。</div><form class="b" id="register"><h2>測試登記</h2><div class="row"><label class="f">登記人姓名<input id="name" required placeholder="測試香客A"></label><label class="f">手機號碼<input id="phone" required inputmode="numeric" placeholder="0912345678"></label></div><div class="row"><label class="f">祈福對象<input id="target" required placeholder="測試對象A"></label><label class=
