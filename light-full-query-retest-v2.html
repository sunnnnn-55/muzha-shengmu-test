<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>點燈完整查詢重測 v2</title><style>body{margin:0;background:#16110e;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif;color:#382719}.wrap{max-width:720px;min-height:100vh;margin:auto;padding:24px 16px;background:#f7efe3}.tag{color:#8d3028;font-size:12px;letter-spacing:.15em}.title{margin:8px 0 16px;font-family:serif;font-size:30px;letter-spacing:.1em}.note{padding:14px;border-left:4px solid #8d3028;border-radius:8px;background:#f0e1ca;font-size:13px;line-height:1.75}.box{margin-top:18px;padding:18px;border:1px solid #dac4a1;border-radius:10px;background:#fffaf1}.field{display:grid;gap:6px;margin:12px 0}.field label{font-weight:800}.field input{padding:13px;border:1px solid #d8cbb8;border-radius:10px;font-size:16px}.btn{width:100%;margin-top:10px;padding:14px;border:0;border-radius:10px;background:#76241d;color:#ffe8b9;font-weight:800;font-size:16px}.card{margin-top:16px;padding:17px;border:1px solid #bfd8c5;border-radius:10px;background:#f0f9f2;line-height:1.9}.card h2{margin:0;font-size:19px;color:#23553c}.pill{display:inline-block;margin:8px 6px 0 0;padding:4px 9px;border-radius:99px;background:#dff1e8;color:#206043;font-size:12px;font-weight:800}.unpaid{background:#f8e7dc;color:#8a3428}</style></head><body><main class="wrap"><div class="tag">LIGHT OFFERING · FULL RETEST V2</div><h1 class="title">點燈登記查詢</h1><div class="note"><b>這次只重測完整查詢卡。</b><br>查詢後必須同時看到：已確認、已繳、燈別、祈福對象、農曆生日、備註。</div><section class="box"><div class="field"><label for="code">點燈碼</label><input id="code" placeholder="LMP-2026-0002"></div><div class="field"><label for="last4">手機末四碼</label><input id="last4" maxlength="4" inputmode="numeric" placeholder="4567"></div><button class="btn" id="queryBtn" type="button">查詢測試資料</button></section><div id="output"></div></main><script>const KEY='msm_v1_demo_state';const codeEl=document.getElementById('code');const last4El=document.getElementById('last4');const outputEl=document.getElementById('output');document.getElementById('queryBtn').addEventListener('click',function(){let state={};try{state=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){}const lamps=Array.isArray(state.lamps)?state.lamps:[];const code=codeEl.value.trim().toUpperCase();const last4=last4El.value.trim();const record=lamps.find(function(item){return item.id===code&&String(item.phone).slice(-4)===last4});outputEl.replaceChildren();const card=document.createElement('article');card.className='card';if(!record){card.textContent='查無測試資料，請確認點燈碼與手機末四碼。';outputEl.appendChild(card);return}const title=document.createElement('h2');title.textContent=record.name+'｜'+record.id;card.appendChild(title);const status=document.createElement('span');status.className='pill';status.textContent=record.status||'待確認';card.appendChild(status);const pay=document.createElement('span');pay.className='pill '+((record.pay||'未繳')==='已繳'?'':'unpaid');pay.textContent=record.pay||'未繳';card.appendChild(pay);const details=document.createElement('div');details.innerHTML='燈別：'+(record.type||'未填寫')+'<br>祈福對象：'+(record.target||'未填寫')+'<br>農曆生日：'+(record.birth||'未填寫')+'<br>備註：'+(record.note||'無')+'<br>繳費狀態：'+(record.pay||'未繳');card.appendChild(details);outputEl.appendChild(card)});</script></body></html>
